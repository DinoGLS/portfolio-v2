services:
  portfolio-prod:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: portfolio
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - WEB3FORMS_ACCESS_KEY=${WEB3FORMS_ACCESS_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
    labels:
      - "com.garlens.service=portfolio"

  portfolio-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: portfolio-dev
    ports:
      - "3002:3000"
    volumes:
      - ./:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    command: npm run dev
