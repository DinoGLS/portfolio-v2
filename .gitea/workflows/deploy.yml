name: Deploy Portfolio

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install Docker CLI
        run: apt-get update -qq && apt-get install -y -qq docker.io

      - name: Build & Deploy
        id: deploy
        run: |
          docker stop portfolio 2>/dev/null || true
          docker rm portfolio 2>/dev/null || true
          DOCKER_BUILDKIT=0 docker build --pull=false -t portfolio:latest .
          docker run -d             --name portfolio             --restart unless-stopped             -p 3001:3000             portfolio:latest
          echo "status=success" >> $GITEA_OUTPUT

      - name: Notify Telegram (succes)
        if: success()
        run: |
          MSG="Deploiement portfolio reussi%0ACommit : ${{ gitea.sha }}%0AAuteur : ${{ gitea.actor }}"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage"             -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}"             -d "parse_mode=HTML"             -d "text=portfolio deploye OK - Commit ${{ gitea.sha }}"

      - name: Notify Telegram (echec)
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage"             -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}"             -d "parse_mode=HTML"             -d "text=ECHEC deploiement portfolio - Commit ${{ gitea.sha }}"
